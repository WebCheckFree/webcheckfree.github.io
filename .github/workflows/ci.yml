name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies from public npm registry
        run: npm install --package-lock=false --registry=https://registry.npmjs.org --no-audit --no-fund

      - name: Generate Cloudflare types
        run: npm run cf:typegen

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run unit and integration tests
        run: npm test

      - name: Validate GitHub Pages files
        run: npm run check:site

      - name: Build Cloudflare Worker dry run
        run: npm run build
