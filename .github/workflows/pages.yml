name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "scripts/check-site.mjs"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:site
      - name: Prepare static site
        env:
          WEBCHECK_API_BASE_URL: ${{ vars.WEBCHECK_API_BASE_URL }}
        run: |
          cp -R site dist
          node --input-type=module - <<'NODE'
          import { readFile, writeFile } from "node:fs/promises";
          const path = "dist/config.js";
          const configured = (process.env.WEBCHECK_API_BASE_URL ?? "").replace(/\/$/, "");
          const source = await readFile(path, "utf8");
          await writeFile(path, source.replace("__WEBCHECK_API_BASE_URL__", configured));
          console.log(configured ? `Using Cloudflare Worker API: ${configured}` : "No Worker API URL configured; setup guidance remains visible.");
          NODE
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
