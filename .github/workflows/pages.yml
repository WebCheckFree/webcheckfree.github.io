name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "scripts/check-site.mjs"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate GitHub Pages source
        run: node scripts/check-site.mjs

      - name: Prepare static website
        env:
          API_BASE_URL: ${{ vars.WEBCHECK_API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "Repository variable WEBCHECK_API_BASE_URL is missing."
            exit 1
          fi

          rm -rf dist
          cp -R site dist

          node <<'NODE'
          const fs = require('node:fs');
          const path = 'dist/config.js';
          const apiBaseUrl = process.env.API_BASE_URL.replace(/\/+$/, '');
          const source = fs.readFileSync(path, 'utf8');

          if (!source.includes('__WEBCHECK_API_BASE_URL__')) {
            throw new Error('Runtime API placeholder is missing from dist/config.js');
          }

          fs.writeFileSync(
            path,
            source.replace('__WEBCHECK_API_BASE_URL__', apiBaseUrl),
            'utf8'
          );
          NODE

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
